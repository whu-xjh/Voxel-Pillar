common:
  img_topic: "/left_camera/image"
  lid_topic: "/livox/lidar"
  imu_topic: "/livox/imu_192_168_1_159"
  external_imu_topic: "/novatel/oem7/odom"
  img_en: 0
  lidar_en: 1
  ros_driver_bug_fix: false

extrin_calib:
  extrinsic_T: [-0.011, -0.02329, 0.04412]
  extrinsic_R: [1, 0, 0, 0, 1, 0, 0, 0, 1]
  Rcl: [0.00610193,-0.999863,-0.0154172,
        -0.00615449,0.0153796,-0.999863,
        0.999962,0.00619598,-0.0060598]
  Pcl: [0.0194384, 0.104689,-0.0251952]

time_offset:
  imu_time_offset: 0.1
  img_time_offset: 0.1
  exposure_time_init: 0.0

preprocess:
  point_filter_num: 1
  filter_size_surf: 0.5
  lidar_type: 1  # Livox Avia
  scan_line: 6  # Avia: 6, Mid360: 4
  blind: 0.8

# Visual Odometry
vio:
  max_iterations: 5
  outlier_threshold: 1000
  img_point_cov: 100
  patch_size: 8
  patch_pyrimid_level: 4
  normal_en: true
  raycast_en: false
  inverse_composition_en: false
  exposure_estimate_en: true
  inv_expo_cov: 0.1
  capacity: 0  # LRU cache (0 = disable)

# IMU
imu:
  imu_en: true
  imu_int_frame: 30
  acc_cov: 0.5
  gyr_cov: 0.3
  b_acc_cov: 0.0001
  b_gyr_cov: 0.0001

# LiDAR-Inertial Odometry
lio:
  max_iterations: 5
  dept_err: 0.02
  beam_err: 0.05
  min_eigen_value: 0.0025
  voxel_size: 1
  max_layer: 2
  max_points_num: 100
  layer_init_num: [5, 5, 5, 5, 5]
  sigma_num: 3
  capacity: 0  # LRU cache (0 = disable)
  rf_enhance_en: true  # Range Field enhancement
  intensity_fusion_en: true

# Pillar Voxel Ground Detection
pillar_voxel:
  pillar_voxel_en: true
  voxel_size: 1.0
  adjacent_check_en: true
  min_adjacent_ground_num: 5
  min_adjacent_isolated_num: 5
  neighbor_search_type: 0  # 0=8-neighbor, 1=24-neighbor
  ground_height_angle_check_en: true
  ground_height_angle_threshold: 0  # degrees
  plane_fitting_ground_en: true
  plane_fitting_distance_threshold: 0.2
  skip_type: 1  # 0=none, 1=skip below ground, 2=skip ground+below

local_map:
  map_sliding_en: false
  half_map_size: 1000
  sliding_thresh: 8

uav:
  imu_rate_odom: true
  gravity_align_en: true

publish:
  dense_map_en: true
  pub_effect_en: true
  pub_plane_en: false
  pub_body_en: false
  pub_scan_num: 1
  blind_rgb_points: 0.0

evo:
  seq_name: "shawan_tunnel_back_ground"
  pose_output_en: true

lidar_save:
  save_en: true
  colmap_output_en: false
  filter_size_pcd: 0.15
  interval: 10

external_imu:
  enable: false
  external_imu_init_frame: 30
  time_offset: 0
  buffer_size: 100000
  external_R: [0, 0, -1, 1, 0, 0, 0, -1, 0]
  external_T: [0, 0, 0]
  external_imu_only: false

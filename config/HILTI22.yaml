common:
  img_topic: "/alphasense/cam0/image_raw"
  lid_topic: "/hesai/pandar"
  imu_topic: "/alphasense/imu"
  img_en: 0
  lidar_en: 1
  ros_driver_bug_fix: false

extrin_calib:
  # Hilti-2022
  extrinsic_T: [-0.001, -0.00855, 0.055] 
  extrinsic_R: [0, -1, 0, -1, 0, 0, 0, 0, -1]
  
  # Hilti-2023
  # extrinsic_T: [-0.006730146149038548, -0.006897049862999071, 0.049898628062256645] 
  # extrinsic_R: [0.006609639848469365, -0.9999773650294649, 0.0012578115132016717, 
  #               -0.9999762249571927, -0.006612093869054189, -0.0019569708811106104, 
  #               0.001965243352927244, -0.0012448467359610184, -0.9999972940839232]

  # Hilti
  Rcl: [ -0.999926,  -0.00670802, 0.0101073,
         -0.0100912, -0.00242564, -0.999946,
          0.00673218,-0.999975, 0.00235777 ]
  Pcl: [ -0.0549762, 0.0675401, -0.0520599 ]

time_offset:
  imu_time_offset: 0.0
  img_time_offset: 0.0
  exposure_time_init: 0.0

preprocess: 
  hilti_en: true
  point_filter_num: 1
  filter_size_surf: 0.2 # 0.2
  lidar_type: 5 # HesaiXT32
  scan_line: 32
  blind: 0.6 # 0.1 0.3 0.6
 
vio:
  max_iterations: 5
  outlier_threshold: 500
  img_point_cov: 1000
  patch_size: 8
  patch_pyrimid_level: 4
  normal_en: true
  raycast_en: false
  inverse_composition_en: false
  exposure_estimate_en: true
  inv_expo_cov: 0.1
  capacity: 0 # LRU cache capacity for visual feature map (0 = disable LRU cache)

imu:
  imu_en: true
  imu_int_frame: 30
  acc_cov: 0.5 # 0.1
  gyr_cov: 0.01
  b_acc_cov: 0.0001 # 0.1
  b_gyr_cov: 0.0001 # 0.1

lio:
  max_iterations: 5
  dept_err: 0.02
  beam_err: 0.05
  min_eigen_value: 0.0001 # 0.0025
  voxel_size: 0.4
  max_layer: 2
  max_points_num: 100
  layer_init_num: [5, 5, 5, 5, 5]
  capacity: 50000  # LRU缓存容量, 越大占用内存越多 (0 = 禁用LRU缓存)
  rf_enhance_en: true
 
# Pillar Voxel 参数配置
pillar_voxel:
  pillar_voxel_en: true
  min_adjacent_num: 3      # 相邻地面体素数量阈值
  pillar_max_capacity: 1 # 每个体素柱最大容量限制（体素数量）
  elevation_axis: "-z"  # 可选值: "x", "-x", "y", "-y", "z", "-z"
  ground_height_angle_check_en: true  # 是否启用基于高度角的地面点过滤
  ground_height_angle_threshold: 5.0  # 高度角阈值（度），超过此阈值不认为是地面点

local_map: 
  map_sliding_en: false
  half_map_size: 1000
  sliding_thresh: 8

uav:
  imu_rate_odom: true
  gravity_align_en: false

publish:
  dense_map_en: false
  pub_effect_en: false
  pub_plane_en: false
  pub_body_en: false  # 是否发布body坐标系下的点云
  pub_voxel_points_en: true
  pub_scan_num: 1 
  blind_rgb_points: 0.0
 
evo:
  seq_name: "exp21_outside_building"
  pose_output_en: true

lidar_save:
  save_en: false
  laz_save_en: false
  colmap_output_en: false # need to set interval = -1
  filter_size_pcd: 0.15
  interval: 1
  # how many LiDAR frames saved in each pcd file;
  # -1 : all frames will be saved in ONE pcd file, may lead to memory crash when having too much frames.

external_imu:
  enable: false  # 是否启用外置IMU
  time_offset: 0  # 外置IMU时间偏移(秒)
  buffer_size: 100000  # external IMU buffer大小
  external_R : [0, 0, -1, 1, 0, 0, 0, -1, 0]
  external_T : [0, 0, 0]
  external_imu_only: false # 是否动态启动

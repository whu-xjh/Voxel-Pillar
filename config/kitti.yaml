common:
  img_topic: "/left_camera/image"
  lid_topic: "/kitti/velo/pointcloud"
  imu_topic: "/livox/imu"
  img_en: 0
  lidar_en: 1
  ros_driver_bug_fix: false

extrin_calib:
  extrinsic_T: [0.04165, 0.02326, -0.0284]
  extrinsic_R: [1, 0, 0, 0, 1, 0, 0, 0, 1]
  Rcl: [0.00610193,-0.999863,-0.0154172,
        -0.00615449,0.0153796,-0.999863,
        0.999962,0.00619598,-0.0060598]
  Pcl: [0.0194384, 0.104689,-0.0251952]

time_offset: 
  imu_time_offset: 0.0
  img_time_offset: 0.1
  exposure_time_init: 0.0

preprocess:
  point_filter_num: 1
  filter_size_surf: 0.5 # 点云体素下采样中的体素大小
  lidar_type: 2 # Velodyne LiDAR (KITTI使用标准点云格式)
  scan_line: 64 # KITTI Velodyne HDL-64E
  blind: 1.0

vio:
  max_iterations: 5
  outlier_threshold: 1000 # 78 100 156 #100 200 500 700 infinite
  img_point_cov: 100 # 100 1000
  patch_size: 8
  patch_pyrimid_level: 4
  normal_en: true
  raycast_en: false
  inverse_composition_en: false
  exposure_estimate_en: true
  inv_expo_cov: 0.1
  capacity: 10000 # LRU cache capacity for visual feature map (0 = disable LRU cache)

imu:
  imu_en: false
  imu_int_frame: 30
  acc_cov: 1 # 0.2
  gyr_cov: 0.5 # 0.5
  b_acc_cov: 0.0001 # 0.1
  b_gyr_cov: 0.0001 # 0.1

# 激光雷达里程计
lio:
  max_iterations: 5
  dept_err: 0.02
  beam_err: 0.05
  min_eigen_value: 0.0025 # 0.005
  voxel_size: 3 # 体素底图尺寸
  max_layer: 3
  max_points_num: 100
  layer_init_num: [5, 5, 5, 5, 5]
  sigma_num: 3
  capacity: 0  # LRU缓存容量, 越大占用内存越多 (0 = 禁用LRU缓存)
  rf_enhance_en: true  # 是否启用配准时候的感受野增强 (Range Field enhancement)
  intensity_fusion_en: true  # 是否启用三维强度概率融合 (几何距离+强度差异)

# Pillar Voxel 参数配置
pillar_voxel:
  pillar_voxel_en: false  # 是否启用pillar体素地图
  voxel_size: 0.5  # 体素柱中的体素大小（米）
  adjacent_check_en: true  # 是否启用邻域检查
  min_adjacent_num: 1    # 相邻地面体素数量阈值
  neighbor_search_type: 0  # 邻域搜索类型: 0=8邻域, 1=24邻域
  ground_height_angle_check_en: false  # 是否启用基于高度角的地面点过滤
  ground_height_angle_threshold: 0  # 高度角阈值（度），超过此阈值不认为是地面点
  plane_fitting_ground_en: true # 是否启用基于平面拟合的二次地面判断
  plane_fitting_distance_threshold: 0.5  # 平面拟合距离阈值（米）
  skip_type: 1 # 0: 不跳过, 1: 跳过地面之下的点, 2: 跳过地面及地面之下的点

local_map:  
  map_sliding_en: false
  half_map_size: 100
  sliding_thresh: 8

uav:
  imu_rate_odom: true
  gravity_align_en: true

publish:
  dense_map_en: true
  pub_effect_point_en: true 
  pub_plane_en: false
  pub_scan_num: 1
  blind_rgb_points: 0.0

evo:
  seq_name: "kitti_00"
  pose_output_en: true

lidar_save:
  save_en: false
  colmap_output_en: false # need to set interval = -1
  filter_size_pcd: 0.15
  interval: -1
  # how many LiDAR frames saved in each pcd file;
  # -1 : all frames will be saved in ONE pcd file, may lead to memory crash when having too much frames.

external_imu:
  enable: false  # 是否启用外置IMU
  time_offset: 0  # 外置IMU时间偏移(秒)
  buffer_size: 100000  # external IMU buffer大小
  external_R : [0, 0, -1, 1, 0, 0, 0, -1, 0]
  external_T : [0, 0, 0]
  external_imu_only: false # 是否动态启动
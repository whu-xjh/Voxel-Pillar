common:
  img_topic: "/left/image_raw"
  lid_topic: "/os1_cloud_node1/points"
  imu_topic: "/imu/imu"
  img_en: 0
  lidar_en: 1
  ros_driver_bug_fix: false

extrin_calib:
  extrinsic_T: [-0.050, 0.000, 0.055]
  extrinsic_R: [1, 0, 0, 0, 1, 0, 0, 0, 1]
  # NTU_VIRAL
  Rcl: [0.0218308, 0.99976, -0.00201407,
        -0.0131205, 0.00230088, 0.999911,
        0.999676, -0.0218025, 0.0131676]
  Pcl: [0.122993,  0.0398643, -0.0577101]

time_offset:
  lidar_time_offset: -0.1
  imu_time_offset: 0.0
  img_time_offset: 0.0
  exposure_time_init: 0.0

preprocess:
  point_filter_num: 1
  filter_size_surf: 0.1
  lidar_type: 3  # Ouster
  scan_line: 16
  blind: 1.0

vio:
  max_iterations: 5
  outlier_threshold: 1000
  img_point_cov: 100
  patch_size: 8
  patch_pyrimid_level: 3
  normal_en: true
  raycast_en: false
  inverse_composition_en: false
  exposure_estimate_en: true
  inv_expo_cov: 0.1

imu:
  imu_en: true
  imu_int_frame: 30
  acc_cov: 0.5
  gyr_cov: 0.3
  b_acc_cov: 0.0001
  b_gyr_cov: 0.0001

lio:
  max_iterations: 5
  dept_err: 0.02
  beam_err: 0.01
  min_eigen_value: 0.0025
  voxel_size: 0.5
  max_layer: 2
  max_points_num: 50
  layer_init_num: [5, 5, 5, 5, 5]
  capacity: 0  # LRU cache (0 = disable)
  rf_enhance_en: false  # Range Field enhancement
  intensity_fusion_en: true

# Pillar Voxel Ground Detection
pillar_voxel:
  pillar_voxel_en: true
  voxel_size: 1.0

  ground_detection_method: 2  # 0=none, 1=plane fitting, 2=neighborhood
  ground_neighbor_type: 1  # 0=4-neighbor, 1=8-neighbor
  min_adjacent_ground_num: 1

  isolated_neighbor_type: 1  # 0=4-neighbor, 1=8-neighbor
  min_adjacent_isolated_num: 1

local_map:
  map_sliding_en: false
  half_map_size: 100
  sliding_thresh: 8

uav:
  imu_rate_odom: true
  gravity_align_en: true

publish:
  dense_map_en: false
  pub_effect_en: false
  pub_plane_en: false
  pub_body_en: false
  pub_scan_num: 1
  blind_rgb_points: 0.0

evo:
  seq_name: "nya_03"
  pose_output_en: true

pcd_save:
  save_en: false
  colmap_output_en: false
  filter_size_pcd: 0.15
  interval: -1  # -1 = save all in one file (memory risk)

external_imu:
  enable: false
  time_offset: 0
  buffer_size: 100000
  external_R: [0, 0, -1, 1, 0, 0, 0, -1, 0]
  external_T: [0, 0, 0]
  external_imu_only: false
